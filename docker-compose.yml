version: '3.8'

services:
  backend:
    build: 
      context: ./app/backend
    restart: unless-stopped
    volumes:
      - ./uploads:/app/uploads
      - ./app/backend/app:/app/app
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - UPLOAD_IMAGES_DIR=${UPLOAD_IMAGES_DIR:-/app/uploads/images}
      - UPLOAD_VIDEOS_DIR=${UPLOAD_VIDEOS_DIR:-/app/uploads/videos}
      - APP_ENV=${APP_ENV:-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost","http://localhost:3000"]}
    depends_on:
      - db

  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - INTERNAL_API_URL=http://backend:8000/api/v1
    depends_on:
      - backend

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-cutesite}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
